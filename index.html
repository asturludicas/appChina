<script>
// Polyfill de window.storage para que la app funcione fuera del entorno de Claude,
// usando localStorage del navegador en su lugar. Misma interfaz async, mismo comportamiento.
window.storage = {
  async get(key, shared) {
    try {
      const raw = localStorage.getItem("chinatrip:" + key);
      if (raw === null) return null;
      return { key, value: raw, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
  async set(key, value, shared) {
    try {
      localStorage.setItem("chinatrip:" + key, value);
      return { key, value, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
  async delete(key, shared) {
    try {
      localStorage.removeItem("chinatrip:" + key);
      return { key, deleted: true, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
  async list(prefix, shared) {
    try {
      const keys = Object.keys(localStorage)
        .filter((k) => k.startsWith("chinatrip:" + (prefix || "")))
        .map((k) => k.replace("chinatrip:", ""));
      return { keys, prefix, shared: !!shared };
    } catch (e) {
      return null;
    }
  },
};

</script>

const { useState, useEffect } = React;

function makeIcon(name) {
  return function Icon(props) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      try {
        if (!ref.current) return;
        ref.current.innerHTML = "";
        if (!window.lucide || !window.lucide.icons || !window.lucide.icons[name]) return;
        const attrs = {};
        if (props.size) { attrs.width = props.size; attrs.height = props.size; }
        if (props.color) { attrs.stroke = props.color; }
        const svg = window.lucide.createElement(window.lucide.icons[name], attrs);
        if (svg) {
          if (props.style) { Object.assign(svg.style, props.style); }
          ref.current.appendChild(svg);
        }
      } catch (e) {
        console.error("Icon render error for", name, e);
      }
    }, [props.size, props.color, JSON.stringify(props.style)]);
    return React.createElement("span", { ref: ref, style: { display: "inline-flex", lineHeight: 0, ...(props.style||{}) } });
  };
}
