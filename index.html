firebase.initializeApp(firebaseConfig);
const db = firebase.database();
window.firebaseDb = db;

// Sanitiza una key para que sea válida como path de Realtime Database
// (no puede contener . # $ [ ] /)
function sanitizeKey(key) {
  return key.replace(/[.#$\[\]\/]/g, "_");
}

// Polyfill de window.storage respaldado por Firebase Realtime Database.
// Misma interfaz que el storage nativo de Claude (get/set/delete/list),
// pero los datos viven en la nube y se sincronizan entre todos los dispositivos
// que abran esta misma app.
window.storage = {
  async get(key, shared) {
    try {
      const safeKey = sanitizeKey(key);
      const snapshot = await db.ref("data/" + safeKey).once("value");
      const value = snapshot.val();
      if (value === null || value === undefined) return null;
      return { key, value: String(value), shared: true };
    } catch (e) {
      console.error("Firebase get error", e);
      return null;
    }
  },
  async set(key, value, shared) {
    try {
      const safeKey = sanitizeKey(key);
      await db.ref("data/" + safeKey).set(value);
      return { key, value, shared: true };
    } catch (e) {
      console.error("Firebase set error", e);
      return null;
    }
  },
  async delete(key, shared) {
    try {
      const safeKey = sanitizeKey(key);
      await db.ref("data/" + safeKey).remove();
      return { key, deleted: true, shared: true };
    } catch (e) {
      console.error("Firebase delete error", e);
      return null;
    }
  },
  async list(prefix, shared) {
    try {
      const snapshot = await db.ref("data").once("value");
      const all = snapshot.val() || {};
      const keys = Object.keys(all).filter((k) => !prefix || k.startsWith(sanitizeKey(prefix)));
      return { keys, prefix, shared: true };
    } catch (e) {
      console.error("Firebase list error", e);
      return null;
    }
  },
};

console.log("Firebase storage conectado — los datos se sincronizan entre todos los dispositivos");

</script>

function makeIcon(name) {
  return function Icon(props) {
    const ref = React.useRef(null);
    React.useEffect(() => {
      try {
        if (!ref.current) return;
        ref.current.innerHTML = "";
        if (!window.lucide || !window.lucide.icons || !window.lucide.icons[name]) return;
        const attrs = {};
        if (props.size) { attrs.width = props.size; attrs.height = props.size; }
        if (props.color) { attrs.stroke = props.color; }
        const svg = window.lucide.createElement(window.lucide.icons[name], attrs);
        if (svg) {
          if (props.style) { Object.assign(svg.style, props.style); }
          ref.current.appendChild(svg);
        }
      } catch (e) {
        console.error("Icon render error for", name, e);
      }
    }, [props.size, props.color, JSON.stringify(props.style)]);
    return React.createElement("span", { ref: ref, style: { display: "inline-flex", lineHeight: 0, ...(props.style||{}) } });
  };
}

    "body_clean": "**Antes de salir del hotel:**\n\n- Pasaporte IMPRESCINDIBLE (control de Tian'anmen y Ciudad Prohibida)\n- Agua y snack/comida rápida para el trayecto de bajada de Mutianyu\n- Ropa algo mejor para la cena de Da Dong por la noche\n\n[TRANSPORTE: Hotel → Mutianyu: chófer privado contratado o DiDi coordinado desde el hotel. Salida 06:30 AM, madrugón militar para batir al sol de julio y a los buses turísticos]\n\n#### 🌅 06:30 - Excursión a la Gran Muralla (Mutianyu)\n\nLlegada a la base a las 08:00 AM. Subida en teleférico cerrado, caminata fotográfica exprés entre 3 o 4 torres de vigilancia y descenso adrenalínico en el mítico tobogán. Salida de la base en el coche a las 11:30 AM en punto.\n\nEntrada Mutianyu: ✅ COMPRADA, 2 adultos, transporte coche privado organizado.\n\n[GUIA:gran_muralla_de_mutianyu]\n\nFicha de app:\n\n- Nombre: Gran Muralla de Mutianyu (慕田峪长城)\n  - Categoría: Monumento / Excursión\n  - Entrada: ✅ COMPRADA\n  - Prioridad: Imprescindible\n\n[TRANSPORTE: Mutianyu → Tian'anmen: trayecto de hora y media de bajada de la montaña al centro de Pekín en el mismo coche]\n\n#### ☀️ 11:30-13:00 - Descenso urbano y comida en coche\n\nTrayecto de hora y media de bajada de la montaña al centro de Pekín. Se aprovecha para descansar las piernas del trekking de la muralla y almorzar snacks o comida rápida en el trayecto.\n\nComida día 9: comida de supervivencia en el coche, no restaurante este día. ⚠️ Comprar el día ANTERIOR (8 jul): fruta, frutos secos, algo salado, bebida, barrita/pan y agua. Este día puede romperse por colas o controles, mejor ir con provisiones de sobra.\n\n#### ☀️ 13:00 - Controles de la Plaza de Tian'anmen\n\nEl coche os deja en el acceso del control militar sur. Paso obligatorio de arcos de seguridad, escáner de mochilas minimalista y revisión de pasaporte físico.\n\n[GUIA:plaza_de_tiananmen]\n\n⚠️ Aviso: la entrada de la Ciudad Prohibida valida el acceso, pero conviene haber pedido en la recepción del hotel el martes 7 que saquen el pase oficial gratuito en su sistema, para evitar colas o bloqueos de cupo con los militares.\n\nFicha de app:\n\n- Nombre: Plaza de Tian'anmen (天安门广场)\n  - Categoría: Plaza histórica / Control de acceso\n  - Prioridad: Alta\n\n#### ☀️ 13:15 - Museo del Palacio en la Ciudad Prohibida\n\n🎫 ✅ COMPRADA. Turno de tarde (acceso general de tarde, 10,72€).\n\nRecorrido lineal de sur a norte por el eje histórico principal: Salón de la Armonía Suprema → Trono del Emperador → Jardín Imperial. Al entrar a mediodía, el 85% de los tours de la mañana ya están saliendo, por lo que los patios están mucho más limpios para fotos sin ríos de gente. Salida del recinto sobre las 16:30 PM.\n\nFicha de app:\n\n- Nombre: Museo del Palacio - Ciudad Prohibida (故宫博物院)\n  - Categoría: Palacio imperial / Imprescindible\n  - Entrada: ✅ COMPRADA, turno tarde\n  - Prioridad: Imprescindible\n\n[GUIA:ciudad_prohibida_tarde]\n\n#### 🌙 20:00 - Cena de celebración en Da Dong\n\n[TRANSPORTE: Hotel → Da Dong: DiDi tras una ducha celestial]\n\nCena oficial de cierre de Pekín para probar el auténtico pato pequinés crujiente. Recuerda haber pedido en recepción el primer día que llamen por teléfono para confirmar la reserva de la mesa.\n\nFicha de app:\n\n- Nombre: Da Dong Roast Duck (大董烤鸭店)\n  - Categoría: Restaurante / Cena de cierre, RESERVA CONFIRMADA\n  - Prioridad: Imprescindible\n\nCena día 9: Da Dong, mesa reservada.",

    "estado_raw": "Cena confirmada (Fan Ji, dirección corregida). Comida: flexible por llegada · 🟡 Día durillo (tren + e-bike 14km muralla) · 💰 Gasto: €€ medio (alquiler e-bike + cena)",
    "color": "🟡",
    "budget": "€€ medio (alquiler e-bike + cena)",
    "body_clean": "**Antes de salir del hotel (tras llegar):**\n\n- Captura del hotel en chino/inglés para taxi o metro\n- Agua y protección solar para la vuelta en e-bike\n\n[TRANSPORTE: Xi'an North Railway Station → Orange Hotel: opción más lógica es metro Línea 2 hasta Zhonglou/Bell Tower y caminar al hotel. Si hay cansancio o calor, DiDi/taxi directo]\n\n#### 🌅 Mañana - Llegada y centro antiguo\n\nLlegada a Xi'an a las 12:31 desde Beijing West, normalmente en Xi'an North Railway Station.\n\nFicha de app:\n\n- Nombre: Llegada a Xi'an + traslado al hotel\n  - Categoría: Transporte / llegada\n  - Apple Maps: https://maps.apple/p/biiQohu.YiUpvJ\n  - Notas: Llegada 12:31 desde Beijing West a Xi'an North Railway Station\n  - Prioridad: Alta\n\nXi'an fue una de las grandes capitales históricas de China y punto de partida de la Ruta de la Seda. El cambio de escala respecto a Pekín se nota: ciudad grande pero centro histórico mucho más compacto.\n\n#### ☀️ Tarde - Barrio Musulmán, Torre del Tambor y Campanario\n\nComida inicial en el Barrio Musulmán, justo detrás de la Torre del Tambor — al estar el hotel junto al barrio, lo mejor es comer por la zona sin desplazarse. Primera toma de contacto perfecta con Xi'an.\n\nFicha de app:\n\n- Nombre: Comida inicial en el Barrio Musulmán\n  - Categoría: Comida / paseo urbano\n  - Apple Maps: https://maps.apple/p/QiDh6V6H-TTxxN\n  - Prioridad: Alta\n\nQué probar: Roujiamo, biangbiang mian, pinchos de cordero, dumplings en sopa agripicante, panes, dulces tradicionales y zenggao (pastel de arroz pegajoso). Fijarse en los puestos de comida, los olores a especias, los panes hechos al momento y la mezcla entre cultura china y musulmana hui.\n\nDespués, paseo a la Torre del Tambor (muy cerca del hotel, no imprescindible entrar pero sí ver por fuera, y mejor aún de noche) y el Campanario de Xi'an (en pleno centro, en medio de un gran cruce — uno de los puntos más reconocibles de la ciudad).\n\nFichas de app:\n\n- Nombre: Torre del Tambor\n  - Categoría: Monumento / centro histórico\n  - Apple Maps: https://maps.apple/p/QiDh6V6H-TTxxN\n  - Notas: No imprescindible entrar, sí verla por fuera y de noche iluminada\n  - Prioridad: Media-alta\n\n[GUIA:torre_del_tambor]\n\n- Nombre: Campanario de Xi'an\n  - Categoría: Monumento / símbolo de la ciudad\n  - Apple Maps: https://maps.apple/p/f7-AqAPMwcr5.7\n  - Notas: Casi \"kilómetro cero\" visual del centro de Xi'an\n  - Prioridad: Media-alta\n\n[GUIA:campanario_de_xian]\n\n#### ☀️ Tarde - Shuyuanmen y muralla en e-bike\n\nShuyuanmen Culture Street: calle tradicional con tiendas de caligrafía, pinceles, tinta, sellos y arte. Queda de camino hacia la Puerta Sur de la muralla.\n\nFicha de app:\n\n- Nombre: Shuyuanmen Culture Street\n  - Categoría: Calle tradicional / cultura / compras\n  - Apple Maps: https://maps.apple/p/PcrjBrPKLkJMKv\n\n[GUIA:shuyuanmen_culture_street]\n  - Prioridad: Media\n\n[TRANSPORTE: Shuyuanmen → Puerta Sur/Yongningmen: paseo a pie, acceso más recomendable y fotogénico para empezar la visita de la muralla]\n\nFicha de app:\n\n- Nombre: Traslado Shuyuanmen → Puerta Sur / Yongningmen\n  - Categoría: Transporte / paseo\n  - Apple Maps: https://maps.apple/p/1nMVbA.JHbj-5U\n  - Prioridad: Alta\n\nSubida a la muralla por Yongningmen/Puerta Sur. La muralla tiene 14 km de recorrido, se puede hacer en bici/e-bike.\n\n[GUIA:muralla_de_xian_en_bici] En julio conviene hacerla al final de la tarde, cuando baja el calor y empieza a iluminarse. No hace falta completar toda la vuelta: un buen tramo, parada para fotos y el atardecer ya merece la pena.\n\nFicha de app:\n\n- Nombre: Muralla de Xi'an en bici / e-bike\n  - Categoría: Monumento / actividad / vistas\n  - Notas: 14 km de recorrido, alquilar bici o e-bike si está disponible. Mejor al final de la tarde\n  - Prioridad: Imprescindible\n\n#### 🌙 Noche - Cena en el Barrio Musulmán y torres iluminadas\n\n[TRANSPORTE: Vuelta a la zona del hotel tras la muralla, sin más desplazamientos largos]\n\nCena en el Barrio Musulmán (cómodo, mucho ambiente, sin más desplazamientos). Si quedan fuerzas, paseo corto para ver la Torre del Tambor y el Campanario iluminados antes de volver al hotel.\n\nCena día 10: En el Barrio Musulmán, sin sitio fijo concreto — puestos y ambiente nocturno.",

    "body_clean": "**Antes de salir del hotel:**\n\n- Pasaporte/entrada (control de acceso al recinto de Terracota)\n- Agua y snack, recinto grande y caluroso\n- Calzado cómodo, va a ser un día largo partido en dos mitades\n\n[TRANSPORTE: Salida del hotel sobre 06:45-07:00 en DiDi, taxi o traslado privado hacia Terracota, para llegar sin estrés a la primera franja de la mañana]\n\n#### 🌅 Mañana - Guerreros de Terracota\n\nSalida muy temprana porque la entrada es en la primera franja de la mañana. Los Guerreros están a unos 40 km del centro, en la zona de Lintong, porque forman parte del enorme complejo funerario del primer emperador Qin Shi Huang.\n\nFicha de app:\n\n- Nombre: Guerreros de Terracota\n  - Categoría: Monumento / arqueología / imprescindible\n  - Entrada: ✅ COMPRADA, franja 08:30-09:30\n  - Notas: Ir directos al Foso 1 (el más impresionante y el que más se llena). Orden recomendado: Foso 1 → Foso 3 → Foso 2 → Museo/carros de bronce si apetece\n  - Prioridad: Imprescindible\n\nFijarse en que no hay dos soldados iguales: peinados, bigotes, armaduras, expresiones, rangos militares, y las zonas que todavía están sin reconstruir. Los guerreros se crearon para proteger al primer emperador en la otra vida; muchas figuras siguen en proceso de excavación y restauración.\n\n[TRANSPORTE: Vuelta a Xi'an tras Terracota. No meter Huaqing Palace ni Mount Li este día — con calor, madrugón y visita arqueológica, lo sensato es volver, comer y descansar]\n\nComida día 11 - Plan B (no buscar algo famoso, el día ya es duro): algo cómodo cerca del hotel o en zona con aire acondicionado al volver de Terracota.\n\n#### ☀️ Tarde - Descanso\n\nPausa de unas dos horas en el hotel para ducha, aire acondicionado y descanso antes de salir de nuevo. En julio el calor condiciona mucho el ritmo — compensa partir el día en dos: visitas temprano y tarde-noche, evitando las horas centrales.\n\n#### 🌙 Tarde-Noche - Gran Pagoda, fuentes y Datang Everbright City\n\n[TRANSPORTE: Desde el hotel NO merece la pena ir andando (6-7 km, 1h20-1h40). Mejor metro o DiDi. En metro: Zhonglou → Línea 2 → Xiaozhai → Línea 3 → Dayanta (~30-40 min). En DiDi: ~25-35 min según tráfico. Dayanta es estación de intercambio de líneas 3 y 4, pero desde el hotel la ruta más simple es L2+L3]\n\nPor la tarde, zona de Dayanta/大雁塔. No es obligatorio subir a la pagoda — lo importante es ver el conjunto, pasear por la plaza y disfrutar del ambiente. Una vez allí, sí merece la pena moverse a pie: Gran Pagoda → plaza de las fuentes → Datang Everbright City.\n\nFicha de app:\n\n- Nombre: Gran Pagoda de la Oca Salvaje\n  - Categoría: Monumento / budismo / zona Tang\n  - Apple Maps: https://maps.apple/p/Hxxm6suzHKwisX\n  - Notas: Construida en época Tang para conservar textos budistas traídos desde India por el monje Xuanzang. Fijarse en la forma escalonada, la simetría del conjunto y la estatua del monje\n\n[GUIA:gran_pagoda_de_la_oca_salvaje]\n  - Prioridad: Alta\n\n- Nombre: Metro Zhonglou (estación)\n  - Categoría: Transporte / metro\n  - Apple Maps: https://maps.apple/p/hMMwojbNXR4LH7\n\n- Nombre: Metro Dayanta (estación)\n  - Categoría: Transporte / metro\n  - Apple Maps: https://maps.apple/p/5HDcp15V6_CquY\n\nParada práctica en Joy City Mall, cerca de la pagoda, para descansar, ir al baño, tomar algo fresco o cenar algo sencillo antes de las fuentes y el paseo nocturno. Si hay cansancio, cenar aquí directamente es buena opción; volver al Barrio Musulmán solo si todavía queda energía.\n\nFicha de app:\n\n- Nombre: Joy City Mall Xi'an\n  - Categoría: Descanso / comida / aire acondicionado\n  - Apple Maps: https://maps.apple/p/6p~qWgKv5q_W6w\n  - Prioridad: Media\n\nFuentes musicales de la Gran Pagoda en la plaza norte — confirmar horario el mismo día, normalmente hay pases de tarde-noche. Opción recomendada: pase de las 19:00 si hay cansancio, o el de las 21:00 para verlo más de noche.\n\nFicha de app:\n\n- Nombre: Fuentes musicales de la Gran Pagoda\n  - Categoría: Espectáculo / noche\n  - Apple Maps: https://maps.apple/p/Hxxm6suzHKwisX\n  - Notas: Pase 19:00 (con cansancio) o 21:00 (más de noche) — confirmar horario ese día\n  - Prioridad: Alta si coincide bien el horario\n\nPara cerrar, paseo por Datang Everbright City — zona nocturna inspirada en la estética Tang, con farolillos, edificios iluminados, gente vestida con hanfu, espectáculos callejeros y mucho ambiente para fotos.\n\nFicha de app:\n\n- Nombre: Datang Everbright City\n  - Categoría: Paseo nocturno / luces / ambiente Tang\n  - Apple Maps: https://maps.apple/p/Rgp79df9uYhMZZ\n\n[GUIA:datang_everbright_city]\n  - Prioridad: Alta\n\n[TRANSPORTE: Vuelta al hotel en metro o DiDi según cansancio y hora. Tras el madrugón de Terracota, no alargar demasiado la noche]\n\nCena día 11: En la zona de Joy City Mall o Barrio Musulmán al volver, sin sitio fijo concreto.",

a de app:\n\n- Nombre: Gongnong Bridge\n  - Categoría: Puente histórico / punto de ruta\n  - Notas: Buen punto para fotos y orientarse dentro de la ruta del Yulong\n  - Prioridad: Media-alta\n\n- Nombre: Ten Mile Gallery\n  - Categoría: Ruta escénica\n  - Prioridad: Media-alta\n\n[GUIA:ten_mile_gallery]\n\nParada opcional en Moon Hill dentro de la ruta si encaja y hay energía (ver desde abajo, sin obligación de subir).\n\nFicha de app:\n\n- Nombre: Moon Hill (parada de ruta)\n  - Notas: Ver el arco desde abajo como parada fotográfica. Subida solo si no hace demasiado calor\n  - Prioridad: Media\n\n#### 🌙 Tarde-noche - West Street o vuelta a Xingping\n\nOpcional al terminar la ruta: cena en West Street (Yangshuo) si apetece ambiente, luego volver a Xingping en taxi/coche.\n\nFicha de app:\n\n- Nombre: West Street, Yangshuo\n  - Categoría: Zona de ocio / cena opcional\n  - Notas: Buena opción para cenar si no estamos cansados. Después hay que volver a Xingping en coche/taxi\n  - Prioridad: Media\n\n**Combinaciones según energía:**\n\n**Opción día fuerte cómodo (taxi/DiDi):** Taxi Xingping → Jinlong Bridge → balsa → comida Jiuxian → bici/e-bike Yulong → Gongnong Bridge → Ten Mile Gallery → vuelta a Xingping.\n\n**Opción día fuerte en e-bike:** E-bike Xingping → Yangshuo → descanso → Yulong → Gongnong Bridge → Ten Mile Gallery → Moon Hill desde abajo → vuelta en e-bike o taxi.\n\n**Opción completa Yangshuo:** Yulong + bici/e-bike + Gongnong Bridge + Ten Mile Gallery + Moon Hill desde abajo + cena West Street + vuelta a Xingping.\n\n---\n\n**Opción B — Longji (excursión de día, solo si se dan todas las condiciones):**\n\nSolo si: hace buen tiempo, hay energía, y se puede cerrar coche privado o excursión organizada la noche anterior. No hacerlo por libre en transporte público desde Yangshuo/Xingping. No hacerlo si hay lluvia, niebla, cansancio o si la logística se complica. Será un día largo de carretera.\n\n**Opción C — Día tranquilo extra:** Paseo por Xingping, café con     "emergencias": "- **Seguro de viaje:** compañía, número de póliza y teléfono de asistencia internacional — capturados offline en el móvil de ambos\n- **Pasaportes:** número de pasaporte y copia escaneada/fotografiada offline (no solo en la nube, también guardada en el dispositivo)\n- **Contacto de emergencia en España:** nombre y teléfono accesibles sin necesidad de desbloquear el móvil (pantalla de bloqueo o tarjeta física)\n- **Medicación básica:** botiquín con lo habitual (analgésico, antidiarreico, antihistamínico, tiritas) — en China continental puede ser difícil encontrar marcas conocidas\n- **Si falla Alipay/WeChat Pay:** llevar algo de efectivo en RMB como respaldo; las tarjetas extranjeras no siempre funcionan en comercios pequeños\n- **Si se pierde un tren:** ir directamente a la ventanilla de servicio al cliente de la estación (人工窗口) con el pasaporte; en trenes de alta velocidad suele haber opción de cambio con cargo\n- **Si se pierde el móvil:** tener anotado en papel o en email accesible desde otro dispositivo: número de pasaporte, contacto de emergencia, número de la póliza de seguro, y contraseña de recuperación de Alipay/WeChat\n- **Frases útiles para hotel/taxi/hospital:** tener preparadas en el móvil (capturas o app de traducción offline) frases básicas en chino para pedir ayuda, decir dónde duele, o pedir que llamen a una ambulancia\n- **Embajada/Consulado de España:**\n\n  - Pekín: Embajada de España en Pekín\n\n  - Shanghái: Consulado General de España en Shanghái (referencia, no está en la ruta del viaje)\n\n  - Cantón (Guangzhou): Consulado General de España en Cantón\n\n  - Hong Kong: Consulado General de España en Hong Kong\n\n  - Nota: localizar dirección exacta y teléfono de cada uno antes de salir, y guardarlos offline"

      "datoCurioso": "Toda la estructura se reconstruyó en 1998 siguiendo las técnicas de la Dinastía Tang: no se usó ni un solo clavo de metal, todo ensamblado con encajes machihembrados de madera de cedro."

    "kowloon_walled_city": {
      "fijarseEn": "La maqueta de bronce a escala en el centro del parque y los paneles arqueológicos con los cimientos de la antigua puerta de la ciudad.",
      "datoCurioso": "Este parque fue, hasta su demolición en 1993, la mítica Ciudad Amurallada de Kowloon: el lugar más densamente poblado del planeta, 50.000 personas en 2.6 hectáreas, sin ley, con clínicas clandestinas, talleres ilegales y control de las Tríadas."
    },
    "mong_kok_mercados": {
      "fijarseEn": "Las bolsas de plástico infladas con oxígeno donde cuelgan miles de peces de colores en las fachadas del Goldfish Market, y los ancianos paseando jaulas de bambú en el Bird Garden.",
      "datoCurioso": "Confinar peces y pájaros cantores en casa no es solo decorativo: está ligado al Feng Shui, donde el movimiento del agua y la vitalidad del animal actúan como catalizadores de prosperidad."
    },
    "mid_levels_escalators": {
      "fijarseEn": "Cómo el comercio y las viviendas han colonizado los desniveles imposibles de la montaña, con portales y restaurantes accesibles solo desde distintas alturas de la escalera.",
      "datoCurioso": "Es el sistema de escaleras mecánicas cubiertas al aire libre más largo del mundo, construido en 1993 no como atracción turística sino como solución de ingeniería de movilidad urbana masiva."
    },
    "man_mo_temple": {
      "fijarseEn": "Las enormes espirales de incienso colgando del techo, quemándose lentamente durante días, y el contraste con las torres residenciales hipermodernas que encajonan el recinto.",
      "datoCurioso": "Dedicado simultáneamente al Dios de la Literatura (Man) y al Dios de la Guerra (Mo), venerados por estudiantes y opositores que buscaban el favor del funcionariado imperial."
    },
    "victoria_peak": {
      "fijarseEn": "El 'efecto de inclinación visual' durante la subida (los rascacielos parecen tumbarse, ilusión óptica) y la barrera radical entre el cemento vertical de la costa y la jungla tropical de las laderas superiores.",
      "datoCurioso": "El funicular se inauguró en 1888 con motores de vapor y servía para que los gobernadores coloniales británicos escaparan del calor y las enfermedades del puerto inferior."
    },
    "ciudad_prohibida": {
      "fijarseEn": "El eje arquitectónico central-norte completo, desde el retrato de Mao en Tian'anmen hasta la salida por la puerta norte.",
      "datoCurioso": "Subir después a Jingshan da la panorámica cenital de los tejados imperiales amarillos — la mejor vista de conjunto de todo el complejo."
    },
    "guerreros_terracota": {
      "fijarseEn": "Que no hay dos soldados iguales: peinados, bigotes, armaduras, expresiones, rangos militares, y las zonas que todavía están sin reconstruir.",
      "datoCurioso": "Los guerreros se crearon para proteger al primer emperador Qin Shi Huang en la otra vida. Muchas figuras siguen todavía en proceso de excavación y restauración. Están a 40 km del centro porque forman parte de su enorme complejo funerario."
    },
    "kuixinglou": {
      "fijarseEn": "El colapso mental que genera su geografía: caminas por una plaza adoquinada convencional, te asomas a la barandilla y descubres que estás flotando en el piso 22 de un rascacielos, con el suelo real transitado por coches abajo del todo.",
      "datoCurioso": "Es el mejor ejemplo vivo del urbanismo en tres dimensiones de Chongqing, ciudad montañosa donde el suelo se construye por capas debido a la falta de suelo llano."
    },
    "liziba_metro": {
      "fijarseEn": "Al pasar montados dentro del tren, fijarse en el silencio absoluto.",
      "datoCurioso": "El tren no toca el edificio: las vías van sobre pilares independientes y la estructura cuenta con aisladores neumáticos de ingeniería que eliminan por completo las vibraciones para los vecinos."
    },
    "jiefangbei": {
      "fijarseEn": "La pequeña torre del reloj central de 27.5 metros (Monumento a la Liberación), que queda ridículamente enana rodeada de rascacielos gigantescos.",
      "datoCurioso": "Es el único monumento cívico de guerra en toda China que no está dedicado a líderes políticos, sino a la victoria del pueblo."
    },
    "tianfu_square": {
      "fijarseEn": "La amplitud de la plaza, los edificios oficiales, la estatua de Mao y el ambiente urbano.",
      "datoCurioso": "Tianfu Square funciona como uno de los puntos centrales de referencia de toda Chengdú."
    },
    "kuanzhai": {
      "fijarseEn": "Los patios, puertas tradicionales, farolillos, tiendas de té y la mezcla de arquitectura antigua con negocios modernos.",
      "datoCurioso": "\"Kuanzhai\" significa \"ancho y estrecho\", por los dos callejones principales de la zona."
    },
    "daci_temple": {
      "fijarseEn": "Los patios tranquilos, tejados tradicionales, incienso y pabellones, en contraste directo con las tiendas de lujo de Taikoo Li justo al lado.",
      "datoCurioso": "Es uno de los mejores ejemplos del contraste de Chengdú: un templo histórico rodeado de una de las zonas comerciales más modernas de la ciudad."
    },
    "ifs_panda": {
      "fijarseEn": "Tiendas, pantallas, centros comerciales, arquitectura moderna, ambiente nocturno y el panda gigante trepando por la fachada del IFS.",
      "datoCurioso": "El panda del IFS se ha convertido en uno de los iconos modernos de Chengdú, muy fotografiado en redes."
    },
    "panda_base": {
      "fijarseEn": "Pandas comiendo bambú, pandas jóvenes, pandas rojos, zonas de descanso y su comportamiento antes de que apriete el calor.",
      "datoCurioso": "Los pandas pasan muchísimas horas comiendo porque el bambú aporta muy poca energía nutricional."
    },
    "heming_teahouse": {
      "fijarseEn": "Gente jugando, bailes, mahjong, limpiadores de oídos, teteras, sillas de bambú y vida cotidiana local.",
      "datoCurioso": "En Chengdú tomar té es casi un plan social completo, no solo una bebida — la gente se queda horas."
    },
    "skp_chengdu": {
      "fijarseEn": "Arquitectura moderna, fuentes de bambú, jardines superiores, diseño interior y el contraste con el Chengdú tradicional de la mañana.",
      "datoCurioso": "SKP representa el Chengdú más futurista y comercial, muy distinto del ambiente de casas de té y callejones tradicionales."
    },
    "jingshan_atardecer": {
      "fijarseEn": "Subir los escalones hasta el pabellón central antes del cierre de accesos, para pillar el atardecer limpio con las vistas panorámicas de todos los tejados dorados de la Ciudad Prohibida.",
      "datoCurioso": "Mover este punto al martes es la clave para liberar el jueves y poder encadenar Mutianyu + Ciudad Prohibida + Da Dong sin agobios."
    },
    "universal_beijing": {
      "fijarseEn": "Si la atracción del castillo (Forbidden Journey) supera los 80 minutos de cola, desviar el tiro a Transformers o Jurassic World y volver al castillo en los últimos 45 minutos antes del cierre.",
      "datoCurioso": "En los últimos 45 minutos antes del cierre las masas locales bajan drásticamente porque se van a cenar, y el pueblo de Harry Potter se ilumina de noche — el mejor momento para el castillo."
    },
    "ciudad_prohibida_tarde": {
      "fijarseEn": "El recorrido lineal de sur a norte por el eje histórico principal: Salón de la Armonía Suprema → Trono del Emperador → Jardín Imperial.",
      "datoCurioso": "Al entrar a mediodía, el 85% de los tours de la mañana ya están saliendo, así que los patios están mucho más limpios para fotos sin ríos de gente."
    },
    "avenue_of_stars": {
      "fijarseEn": "Las huellas de manos de celebridades impresas en las barandillas de madera junto al agua. También la estatua de bronce de Bruce Lee de dos metros de altura en su pose clásica.",
      "datoCurioso": "El rediseño de 2019 fue liderado por el arquitecto James Corner, responsable del High Line de Nueva York, incorporando sistemas de reducción del calor urbano mediante plantas nativas."
    },
    "sheung_wan": {
      "fijarseEn": "Los frascos de vidrio alineados en las fachadas comerciales que contienen nidos de golondrina desecados, vieiras deshidratadas y raíces de ginseng. Las balanzas tradicionales de madera y metal usadas por los comerciantes.",
      "datoCurioso": "Este barrio fue el primer asentamiento de las fuerzas británicas en 1841 y evolucionó como el núcleo de distribución de medicina tradicional china debido a su proximidad al puerto colonial."
    },
    "peak_tram_lower_terminus": {
      "fijarseEn": "El sistema de poleas y cables de acero visibles en la fosa del suelo mecánicamente activos cuando el funicular desciende. Las pantallas de la estación que muestran la evolución histórica de los vagones.",
      "datoCurioso": "Inaugurado en 1888, es el funicular más antiguo de Asia. Utiliza un sistema de cable doble donde el peso del vagón que desciende ayuda a impulsar mecánicamente al vagón que sube."
    },
    "central_pier_no_7_star_ferry": {
      "fijarseEn": "Los bolardos y amarras de cuerda de cáñamo manejados manualmente por los marineros con uniformes marineros tradicionales. El característico color verde y blanco de los barcos de dos pisos.",
      "datoCurioso": "La flota sigue utilizando motores diésel-eléctricos y los asientos de madera del piso superior tienen respaldos reversibles que los pasajeros cambian de sentido según la dirección del viaje."
    },
    "yuen_po_bird_garden": {
      "fijarseEn": "Las jaulas de bambú talladas a mano colgadas de los árboles y los comederos de porcelana miniatura dentro de ellas. Los cuidadores locales alimentando a los pájaros con pinzas de madera.",
      "datoCurioso": "El parque fue construido en 1997 por el gobierno para reubicar a los comerciantes desplazados de la calle Choi Hung, emulando el diseño arquitectónico de los jardines tradicionales de Jiangnan."
    },
    "sneaker_street": {
      "fijarseEn": "Los escaparates saturados de zapatillas de edición limitada expuestas en los niveles inferiores de Fa Yuen Street. La repetición de las tiendas de las mismas cadenas comerciales una tras otra.",
      "datoCurioso": "Debido a la densidad comercial de este tramo de apenas 500 metros, las marcas deportivas globales lo utilizan como un mercado de prueba clave para evaluar la aceptación de nuevos diseños en Asia."
    },
    "ladies_market": {
      "fijarseEn": "La estructura desmontable de tubos metálicos y lonas de colores que forman los puestos a lo largo de Tung Choi Street. Los pasillos estrechos saturados de productos suspendidos a los lados.",
      "datoCurioso": "Fundado formalmente en 1975, fue el primer mercado callejero regulado por el gobierno de Hong Kong para legalizar y controlar la venta ambulante en la densa zona residencial de Mong Kok."
    },
    "portland_street": {
      "fijarseEn": "La alta densidad de carteles comerciales verticales en los niveles inferiores de los edificios de apartamentos tipo Tong Lau. Las entradas estrechas de los comercios locales a pie de calle.",
      "datoCurioso": "Históricamente fue el epicentro del distrito rojo de Hong Kong controlado por las Tríadas durante el siglo XX, y sirvió de escenario principal para el cine de gánsteres de Wong Kar-wai."
    },
    "templo_del_cielo_y_mercado_de_las_perlas": {
      "fijarseEn": "La unión pura de las vigas de madera del Salón de la Oración por la Cosecha Buena sin usar un solo clavo de metal. Las perlas naturales expuestas en bandejas bajo luces potentes para verificar sus imperfecciones.",
      "datoCurioso": "Los tres círculos concéntricos de piedra del Altar Circular están diseñados matemáticamente en múltiplos del número nueve, considerado el número imperial máximo en la dinastía Ming."
    },
    "houhai_y_nanluoguxiang": {
      "fijarseEn": "Los detalles de piedra tallada con forma de tambor o caja en las puertas de entrada de los hutongs, que indicaban el rango del dueño. Los puentes de piedra sobre el canal del lago.",
      "datoCurioso": "Nanluoguxiang fue construido durante la dinastía Yuan y es uno de los pocos hutongs que conserva intacta la estructura clásica de cuadrícula tipo espina de pescado del urbanismo de la época."
    },
    "gran_muralla_de_mutianyu": {
      "fijarseEn": "Las almenas dobles con saeteras orientadas en ambas direcciones de la muralla, una característica defensiva particular de esta sección. La vegetación forestal que rodea las 23 torres de vigilancia.",
      "datoCurioso": "Esta sección fue construida sobre cimientos del siglo VI y reforzada en la dinastía Ming por el general Qi Jiguang utilizando bloques de granito extraídos de canteras locales."
    },
    "plaza_de_tiananmen": {
      "fijarseEn": "La simetría exacta de las farolas monumentales alineadas y el Monumento a los Héroes del Pueblo en el centro geométrico. Las cámaras de seguridad integradas en los postes de iluminación.",
      "datoCurioso": "Con una superficie de 440.000 metros cuadrados, fue ampliada deliberadamente en 1959 para albergar congregaciones de más de medio millón de personas siguiendo el estilo del urbanismo soviético."
    },
    "datang_everbright_city": {
      "fijarseEn": "El sistema de iluminación LED que tiñe los edificios modernos de tonos dorados y rojos simétricos. Las plataformas donde los actores realizan muestras de equilibrio estático imitando esculturas vivas.",
      "datoCurioso": "Es un eje peatonal de 2.100 metros diseñado específicamente en Xi'an para replicar el trazado comercial de Chang'an durante la dinastía Tang, utilizando tecnología de iluminación contemporánea."
    },
    "torre_del_tambor": {
      "fijarseEn": "Los veinticuatro tambores alineados en las balconadas exteriores, cada uno decorado con caracteres caligráficos que representan los términos solares del calendario agrícola.",
      "datoCurioso": "Construida en 1380, la torre no utiliza clavos de hierro en su estructura de madera y albergaba un reloj de agua monumental que coordinaba el toque de queda de la ciudad."
    },
    "campanario_de_xian": {
      "fijarseEn": "La base cuadrada de mampostería gris oscura con un arco triple de paso central. Las tejas de cerámica vidriada verde oscuro de los tres niveles de aleros.",
      "datoCurioso": "Es la torre de campana más grande de China. Fue trasladada íntegramente unos 1.000 metros al este de su ubicación original en 1582 debido a la reestructuración del centro urbano. (Verificado)"
    },
    "shuyuanmen_culture_street": {
      "fijarseEn": "Los bloques de tinta maciza grabados con relieves y los pinceles de pelo de lobo o cabra suspendidos en los soportes de las tiendas. El pavimento de losas de piedra gris.",
      "datoCurioso": "La calle recibe su nombre de la Academia Guanzhong, la institución educativa más alta de la provincia durante las dinastías Ming y Qing, fundada originalmente en el siglo XVII."
    },
    "muralla_de_xian_en_bici": {
      "fijarseEn": "La anchura uniforme de la plataforma superior pavimentada con ladrillos grises y las rampas empinadas de acceso para caballos llamadas ma dao. Las torres de defensa sobresalientes cada 120 metros.",
      "datoCurioso": "Construida en el siglo XIV sobre la base de la dinastía Tang, el núcleo interno está hecho de tierra apisonada, cal y arroz glutinoso, lo que le confiere una gran resistencia estructural."
    },
    "gran_pagoda_de_la_oca_salvaje": {
      "fijarseEn": "La inclinación sutil hacia el noroeste de la estructura de ladrillo visible desde la plaza norte. Las ventanas arqueadas simples en cada uno de sus siete pisos cuadrados.",
      "datoCurioso": "Fue construida en el año 652 bajo la supervisión directa del monje Xuanzang con el propósito de almacenar los textos budistas y reliquias que trajo de su viaje de 17 años a la India."
    },
    "shibati": {
      "fijarseEn": "El desnivel abrupto de los escalones de piedra arenisca gris que conectan la parte alta y baja de la ciudad. Las fachadas reconstruidas combinando madera oscura y arquitectura de estilo Bayu.",
      "datoCurioso": "Históricamente era la única vía de conexión peatonal directa entre el centro comercial de la ciudad alta y el puerto del río en la ciudad baja, sobreviviendo a los bombardeos de la Segunda Guerra Mundial."
    },
    "puente_qiansimen": {
      "fijarseEn": "La torre única de acero en forma de diamante de la que parten los cables atirantados. El piso inferior por donde circula la línea 6 del metro de Chongqing justo debajo de los coches.",
      "datoCurioso": "Es un puente atirantado de doble piso que cruza el río Jialing; su diseño estructural de un solo pilar minimiza el impacto visual sobre el paisaje histórico del complejo de Hongyadong."
    },
    "teleferico_del_rio_yangtse": {
      "fijarseEn": "Las grandes poleas mecánicas de la estación motriz que guían el cable de tracción. El balanceo de la cabina al pasar por encima de las torres de soporte estructural en medio del río.",
      "datoCurioso": "Inaugurado en 1987, fue diseñado por ingenieros locales como transporte público esencial para conectar los distritos de Yuzhong y Nan'an antes de la construcción de puentes modernos."
    },
    "daijia_alley_y_cliff_boardwalk": {
      "fijarseEn": "Los anclajes de acero perforados directamente en la roca vertical del acantilado que sostienen la pasarela peatonal. Las raíces de los árboles ficus entrelazadas en los muros de contención de piedra antigua.",
      "datoCurioso": "Esta pasarela aprovecha los antiguos pasajes defensivos de la muralla de la ciudad y las defensas construidas durante la guerra, conectando un desnivel de más de 50 metros mediante ingeniería de voladizo moderna."
    },
    "zhangjiajie_national_forest_park": {
      "fijarseEn": "Las columnas de arenisca de cuarzo de más de 200 metros de altura con bases delgadas y copas cubiertas de pinos. Las profundas fracturas verticales que separan los pilares.",
      "datoCurioso": "El relieve de pilares es el resultado de millones de años de erosión física provocada por la expansión del hielo en las grietas de la roca y la actividad tectónica de elevación durante el Neozoico."
    },
    "furongzhen": {
      "fijarseEn": "Las calles empedradas, los farolillos, los tejados tradicionales, las casas de madera colgadas sobre el agua, el sonido constante de la cascada y el cambio radical del pueblo entre el día y la noche iluminada.",
      "datoCurioso": "Conocido antiguamente como Wangcun, tiene más de 2.000 años de historia ligada a la cultura Tujia. Su imagen más famosa — las casas tradicionales construidas sobre la gran cascada — le ha valido el nombre de 'pueblo antiguo colgado sobre la cascada'."
    },
    "mirador_20_yuanes": {
      "fijarseEn": "La curva exacta del río Li, las montañas kársticas al fondo y las barcas tradicionales — la composición exacta que aparece en el reverso del billete de 20 yuanes chino.",
      "datoCurioso": "El paisaje del billete fue fotografiado desde este mirador de Xingping. Es uno de los pocos casos en que el reverso de un billete muestra un lugar concreto y accesible que puedes visitar y replicar la imagen tú mismo."
    },
    "xingping_ancient_town": {
      "fijarseEn": "Las calles antiguas con adoquines desgastados, las casas tradicionales con fachadas oscuras de madera y las vistas hacia las montañas kársticas que rodean el pueblo por todos lados.",
      "datoCurioso": "Xingping fue durante siglos el puerto fluvial más importante de la región antes de que Yangshuo creciera como destino turístico. Hoy conserva mucho más ambiente local y auténtico que Yangshuo."
    },
    "rio_yulong": {
      "fijarseEn": "El río tranquilo y estrecho flanqueado por picos kársticos, las balsas de bambú sin motor deslizándose entre los puentes de piedra y los búfalos que a veces aparecen pastando en las orillas.",
      "datoCurioso": "El Yulong es mucho más estrecho y tranquilo que el río Li, lo que permite pasar por debajo de puentes medievales de piedra en balsa. La ruta Jinlong Bridge-Jiuxian Village es el tramo más fotogénico y menos transitado."
    },
    "balsa_bambu_yulong": {
      "fijarseEn": "Las balsas sin motor empujadas con pértigas, los puentes de piedra medievales que se cruzan por encima o se pasan por debajo según el nivel del agua, y las aldeas que asoman entre la vegetación.",
      "datoCurioso": "A diferencia del río Li, el Yulong no permite barcas motorizadas en la mayor parte del recorrido, lo que mantiene el silencio y el ambiente rural que el Li perdió hace décadas con el turismo masivo."
    },
    "laozhai_mountain": {
      "fijarseEn": "La panorámica completa de la curva del río Li serpenteando entre picos kársticos desde arriba — la misma perspectiva del billete de 20 yuanes pero desde mayor altura y con el pueblo de Xingping en primer plano.",
      "datoCurioso": "El nombre Laozhai significa 'campamento antiguo' — la cima fue usada históricamente como puesto de vigilancia y refugio en caso de inundación del río Li."
    },
    "moon_hill": {
      "fijarseEn": "El gran arco natural de roca caliza en forma de luna perfecta perforada en la cima de la montaña. La forma cambia ligeramente según el ángulo desde el que se mire: luna llena desde el sur, luna en cuarto creciente desde el norte.",
      "datoCurioso": "El arco tiene unos 50 metros de diámetro y es uno de los arcos naturales de caliza más grandes de China. Se formó por la erosión del agua durante millones de años en la roca kárstica."
    },
    "ten_mile_gallery": {
      "fijarseEn": "La sucesión continua de picos kársticos de formas distintas que bordean la carretera durante kilómetros, cada uno con un nombre popular que refleja su silueta: la montaña de la mariposa, el árbol de pino, el dragón.",
      "datoCurioso": "La 'galería' de karst que bordea la carretera entre Yangshuo y el río Yulong concentra algunas de las montañas con nombres más pintorescos de la región — los locales llevan siglos bautizando cada pico por su forma."
    },
    "xianggong_hill": {
      "fijarseEn": "El río Li serpenteando entre decenas de picos kársticos vistos desde arriba al amanecer, cuando la neblina matinal entre las montañas crea un efecto de paisaje flotante que es imposible de ver a plena luz del día.",
      "datoCurioso": "Xianggong Hill es uno de los miradores más fotografiados de toda la región del río Li, pero requiere coordinar transporte local porque no tiene acceso directo en transporte público desde Xingping."
    }
  },
